<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner - Vintage Mode</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-blue: #0000FF;
            --info-color: rgba(0,0,0,0.6);
        }

        [data-theme='dark'] {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-blue: #5555FF;
            --info-color: rgba(255,255,255,0.6);
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            transition: background 2s ease; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            cursor: default; 
        }

        canvas { display: block; width: 100%; height: 100%; pointer-events: none; position: absolute; top: 0; left: 0; }
        
        #ui { position: absolute; width: 100%; top: 0; left: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; padding: 30px; box-sizing: border-box; z-index: 10; }
        
        .header { 
            display: flex; flex-direction: column; text-align: left; font-size: 32px; font-weight: 900; line-height: 0.9; letter-spacing: -1.5px; 
            color: var(--text-color); text-transform: uppercase; pointer-events: auto; 
            transition: color 2s ease;
        }
        @media (min-width: 769px) { .header { flex-direction: row; gap: 12px; } }
        
        .footer { text-align: right; font-size: 15px; pointer-events: auto; }
        .footer a { 
            color: var(--accent-blue); 
            text-decoration: none; 
            font-weight: 600; 
            letter-spacing: 0.2px; 
            transition: color 2s ease;
        }

        #start-btn {
            position: absolute; top: 0; left: 0;
            background: none; border: none; color: #FFF000; cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            padding: 25px 35px; z-index: 11; white-space: nowrap; display: inline-block;
            transition: color 0.1s ease;
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background: #EAFF00; z-index: -1; border-radius: 2px; display: none;
        }

        #start-btn:hover { color: #000; }
        #start-btn:hover::before { 
            display: block; 
            animation: apple-blink 4.5s infinite;
            animation-delay: 3s;
        }

        @keyframes apple-blink {
            0%, 10%, 20%, 30% { opacity: 1; text-decoration: underline; text-underline-offset: 3px; }
            5%, 15%, 25% { opacity: 0; text-decoration: none; }
            33.1%, 100% { opacity: 1; text-decoration: underline; text-underline-offset: 3px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header" id="main-header"><span>MAX</span><span>GSCHWENDTNER</span></div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>
    <button id="start-btn">UNDER CONSTRUCTION</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const headerEl = document.getElementById('main-header');

        let width, height, dpr;
        const tvSpeed = 1.05; 
        let bounceX, bounceY, speedX = tvSpeed, speedY = tvSpeed; 
        let mouseX = -500, mouseY = -500;
        let isHovering = false, hoverStartTime = 0;

        function updateTheme() {
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 6;
            document.body.setAttribute('data-theme', isNight ? 'dark' : 'light');
        }

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            bounceX = width / 2; bounceY = height / 2;
            updateTheme();
        }

        window.addEventListener('mousemove', (e) => { 
            mouseX = e.clientX; mouseY = e.clientY; 
        });

        startBtn.addEventListener('mouseenter', () => { isHovering = true; hoverStartTime = Date.now(); });
        startBtn.addEventListener('mouseleave', () => { isHovering = false; });
        
        startBtn.addEventListener('mousedown', () => {
            const r = Math.random();
            if (r < 0.33) speedX *= -1;
            else if (r < 0.66) speedY *= -1;
            else { speedX *= -1; speedY *= -1; }
            speedX = tvSpeed * Math.sign(speedX);
            speedY = tvSpeed * Math.sign(speedY);
        });
