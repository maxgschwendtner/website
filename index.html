<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Gschwendtner</title>
    <style>
        body { 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0;
            background-color: #fff;
            color: #000;
            -webkit-font-smoothing: antialiased;
            /* Ermöglicht unendliches Scrollen */
            min-height: 5000px; 
        }

        header {
            display: flex;
            justify-content: space-between; 
            align-items: baseline;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 40px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px); /* Schicker Glas-Effekt */
            z-index: 100;
        }

        h1 { 
            font-weight: 800; 
            font-size: 3.5rem; 
            margin: 0;
            text-transform: uppercase; 
            letter-spacing: -0.04em;
            line-height: 0.9;
        }

        .mail-link {
            font-size: 1rem;
            text-decoration: none;
            color: #000;
        }

        /* Container für die Punkte */
        .content {
            padding-top: 300px;
        }

        .dot-row {
            height: 40vh; /* Abstand zwischen den Punkten beim Scrollen */
            display: flex;
            position: relative;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #000;
            border-radius: 50%;
        }

        /* Verschiedene "Random" Positionen */
        .p1 { margin-left: 15%; }
        .p2 { margin-left: 65%; }
        .p3 { margin-left: 40%; }
        .p4 { margin-left: 85%; }
        .p5 { margin-left: 5%; }
        .p6 { margin-left: 55%; }
        .p7 { margin-left: 25%; }
        .p8 { margin-left: 75%; }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .dot-row { height: 30vh; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MAX GSCHWENDTNER</h1>
        <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail@maxgschwendtner.com</a>
    </header>

    <div class="content">
        <div class="dot-row p1"><div class="dot"></div></div>
        <div class="dot-row p4"><div class="dot"></div></div>
        <div class="dot-row p7"><div class="dot"></div></div>
        <div class="dot-row p2"><div class="dot"></div></div>
        <div class="dot-row p5"><div class="dot"></div></div>
        <div class="dot-row p3"><div class="dot"></div></div>
        <div class="dot-row p8"><div class="dot"></div></div>
        <div class="dot-row p6"><div class="dot"></div></div>
        <div class="dot-row p2"><div class="dot"></div></div>
        <div class="dot-row p1"><div class="dot"></div></div>
        <div class="dot-row p4"><div class="dot"></div></div>
        <div class="dot-row p7"><div class="dot"></div></div>
        </div>

</body>
</html>
