<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Gschwendtner</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #fff;
            color: #000;
            overflow: hidden;
            
            /* Old School Windows Cursor (Pixel-Style SVG) */
            cursor: url('data:image/svg+xml;utf8,<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M0 0V22L6 16L11 27L15 25L10 14H18L0 0Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="miter"/></svg>'), auto;
        }

        /* Fixierte Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            padding: 30px 40px;
            z-index: 1000;
            pointer-events: none; 
        }

        h1 {
            font-weight: 800;
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            line-height: 0.9;
            pointer-events: auto;
        }

        .mail-link {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 0.9rem;
            text-decoration: none;
            color: #000;
            font-weight: 500;
            z-index: 1000;
            letter-spacing: 0.05em;
            /* Auch hier der Cursor beim Hover */
            cursor: url('data:image/svg+xml;utf8,<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M0 0V22L6 16L11 27L15 25L10 14H18L0 0Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="miter"/></svg>'), pointer;
        }

        .mail-link:hover {
            opacity: 0.5;
        }

        /* Scroll-Bereich */
        #scroll-container {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            position: relative;
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        
        #scroll-container::-webkit-scrollbar { 
            display: none; 
        }

        #canvas {
            width: 16000px; 
            height: 16000px;
            position: relative;
            background-color: #ffffff;
        }

        /* Die winzigen schwarzen Punkte */
        .dot {
            position: absolute;
            background-color: #000;
            border-radius: 50%;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.15s ease;
        }

        .dot.popped {
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            header { padding: 20px; }
            .mail-link { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MAX GSCHWENDTNER</h1>
    </header>

    <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail@maxgschwendtner.com</a>

    <div id="scroll-container">
        <div id="canvas">
            </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const container = document.getElementById('scroll-container');

        const numberOfDots = 180; // Leicht erhöht bei 16000px Fläche

        function createDot() {
            const dot = document.createElement('div');
            dot.className = 'dot';

            const size = Math.random() * (5 - 2) + 2; // Sehr klein: 2px bis 5px
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;

            const maxX = canvas.offsetWidth - size;
            const maxY = canvas.offsetHeight - size;
            dot.style.left = `${Math.random() * maxX}px`;
            dot.style.top = `${Math.random() * maxY}px`;

            dot.addEventListener('mouseenter', () => {
                dot.classList.add('popped');
                setTimeout(() => dot.remove(), 250);
            });

            canvas.appendChild(dot);
        }

        for (let i = 0; i < numberOfDots; i++) {
            createDot();
        }

        window.addEventListener('load', () => {
            container.scrollLeft = (canvas.offsetWidth - window.innerWidth) / 2;
            container.scrollTop = (canvas.offsetHeight - window.innerHeight) / 2;
        });
    </script>
</body>
</html>
