<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fff; }
        header { position: fixed; top: 0; left: 0; padding: 30px 40px; pointer-events: none; z-index: 100; }
        h1 { font-weight: 800; font-size: 3.5rem; margin: 0; text-transform: uppercase; letter-spacing: -0.04em; }
        .mail-link { position: fixed; bottom: 30px; right: 40px; font-size: 1rem; text-decoration: none; color: #000; font-weight: 500; z-index: 100; }
        #player { position: absolute; width: 18px; height: 18px; background-color: #FFD700; border-radius: 50%; z-index: 50; transform: translate(-50%, -50%); }
        .dot { position: absolute; width: 10px; height: 10px; background-color: #000; border-radius: 50%; }
    </style>
</head>
<body>
    <header><h1>MAX GSCHWENDTNER</h1></header>
    <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail@maxgschwendtner.com</a>
    <div id="player"></div>
    <script>
        const playerEl = document.getElementById('player');
        let pX = window.innerWidth/2, pY = window.innerHeight/2, vX = 0, vY = 0;
        const gravity = 0.3, jumpStrength = -11, speed = 0.8;
        let platforms = [], moveLeft = false, moveRight = false;

        function createPlatform(yPos) {
            const el = document.createElement('div'); el.className = 'dot';
            const x = Math.random() * (window.innerWidth - 60) + 30;
            el.style.left = x + 'px'; el.style.top = yPos + 'px';
            document.body.appendChild(el);
            return { x, y: yPos, el };
        }
        for (let i = 0; i < 8; i++) platforms.push(createPlatform(window.innerHeight + (i * 150)));

        window.addEventListener('keydown', e => { if(e.key==='ArrowLeft') moveLeft=true; if(e.key==='ArrowRight') moveRight=true; });
        window.addEventListener('keyup', e => { if(e.key==='ArrowLeft') moveLeft=false; if(e.key==='ArrowRight') moveRight=false; });
        window.addEventListener('touchstart', e => { const tX = e.touches[0].clientX; if(tX < window.innerWidth/2) moveLeft=true; else moveRight=true; });
        window.addEventListener('touchend', () => { moveLeft=false; moveRight=false; });

        function gameLoop() {
            if(moveLeft) vX -= speed; if(moveRight) vX += speed;
            vX *= 0.85; pX += vX; vY += gravity; pY += vY;
            if(pX < 0) pX = window.innerWidth; if(pX > window.innerWidth) pX = 0;
            if(pY < window.innerHeight/2) {
                let diff = window.innerHeight/2 - pY; pY = window.innerHeight/2;
                platforms.forEach(p => { p.y += diff; p.el.style.top = p.y + 'px'; });
            }
            if(platforms[0].y > window.innerHeight + 100) {
                const old = platforms.shift(); old.el.remove();
                platforms.push(createPlatform(platforms[platforms.length-1].y - 180));
            }
            if(vY > 0) platforms.forEach(p => {
                if(Math.hypot(pX-p.x, pY-p.y) < 25) vY = jumpStrength;
            });
            if(pY > window.innerHeight + 50) { pX=window.innerWidth/2; pY=window.innerHeight/2; vY=0; }
            playerEl.style.left = pX + 'px'; playerEl.style.top = pY + 'px';
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
