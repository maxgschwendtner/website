<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner - 3D Stable</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-blue: #0000FF;
            --info-color: rgba(0,0,0,0.4);
        }

        [data-theme='dark'] {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-blue: #5555FF;
            --info-color: rgba(255,255,255,0.4);
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            transition: background 2s ease; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            cursor: default;
        }

        canvas { display: block; width: 100%; height: 100%; pointer-events: none; position: absolute; top: 0; left: 0; }
        
        #ui { position: absolute; width: 100%; top: 0; left: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; padding: 30px; box-sizing: border-box; z-index: 10; }
        
        .header { 
            display: flex; flex-direction: column; text-align: left; font-size: 32px; font-weight: 900; line-height: 0.9; letter-spacing: -1.5px; 
            color: var(--text-color); text-transform: uppercase; pointer-events: auto; 
            transition: color 2s ease;
        }
        @media (min-width: 769px) { .header { flex-direction: row; gap: 12px; } }
        
        .footer { text-align: right; font-size: 15px; pointer-events: auto; }
        .footer a { color: var(--accent-blue); text-decoration: none; font-weight: 600; letter-spacing: 0.2px; transition: color 2s ease; }

        #btn-wrapper {
            position: absolute;
            top: 0; left: 0;
            perspective: 800px; /* Perspektive direkt hier für Stabilität */
            pointer-events: none;
            z-index: 11;
        }

        #start-btn {
            background: none; border: none; color: #FFF000; cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            padding: 25px 35px; white-space: nowrap; display: inline-block;
            transform-style: preserve-3d;
            transition: color 0.1s ease;
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background: #EAFF00; z-index: -1; border-radius: 2px; display: none;
        }

        #start-btn:hover { color: #000; }
        #start-btn:hover::before { display: block; }

        /* Blinken: Nur Schrift weg */
        #start-btn:hover span {
            animation: text-blink 4.5s infinite;
            animation-delay: 3s;
        }

        @keyframes text-blink {
            0%, 10%, 20%, 30% { opacity: 1; }
            5%, 15%, 25% { opacity: 0; }
            33.1%, 100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header" id="main-header"><span>MAX</span><span>GSCHWENDTNER</span></div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>
    
    <div id="btn-wrapper">
        <button id="start-btn"><span>UNDER CONSTRUCTION</span></button>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const btnWrapper = document.getElementById('btn-wrapper');
        const headerEl = document.getElementById('main-header');

        let width, height, dpr;
        const tvSpeed = 1.05; 
        let bounceX, bounceY, speedX = tvSpeed, speedY = tvSpeed;
        
        // 3D Variablen
        let rotX = 0, rotY = 0, rotZ = 0;
        let depth = 0, speedDepth = 0.5;

        let mouseX = -2000, mouseY = -2000;
        let isHovering = false, hoverStartTime = 0;

        function updateTheme() {
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 6;
            document.body.setAttribute('data-theme', isNight ? 'dark' : 'light');
        }

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            bounceX = width / 2; bounceY = height / 2;
            updateTheme();
        }

        window.addEventListener('mousemove', (e) => { 
            mouseX = e.clientX; mouseY = e.clientY; 
        });

        startBtn.addEventListener('mousedown', () => {
            speedX *= -1.1; // Kleiner Kick beim Klick
            speedY *= -1.1;
            speedDepth *= -1;
        });

        startBtn.addEventListener('mouseenter', () => { isHovering = true; hoverStartTime = Date.now(); });
        startBtn.addEventListener('mouseleave', () => { isHovering = false; });

        function drawGrid() {
            const timeElapsed = isHovering ? (Date.now() - hoverStartTime) / 1000 : 0;
            const useGR = timeElapsed > 3;
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            ctx.fillStyle = isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.12)";
            
            const spacing = 40;
            for (let x = 0; x <= width; x += spacing) {
                for (let y = 0; y <= height; y += spacing) {
                    let gx = x, gy = y;
                    if (useGR) {
                        gx += Math.sin(x * 1.618) * 4;
                        gy += Math.cos(y * 1.618) * 4;
                    }
                    ctx.beginPath(); ctx.arc(gx, gy, 0.7, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

        function drawCursorCoords() {
            ctx.save();
            ctx.translate(mouseX + 15, mouseY + 15);
            ctx.font = "400 10px monospace";
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--info-color');
            ctx.textAlign = "left";
            ctx.fillText(`X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`, 0, 10);
            ctx.restore();
        }

        function update() {
            let dx = bounceX - mouseX;
            let dy = bounceY - mouseY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            // Subtiler Schubs
            if (!isHovering && dist < 120) {
                const pushStrength = 0.002;
                speedX += dx * pushStrength;
                speedY += dy * pushStrength;
            }

            // Rückkehr zur Soll-Geschwindigkeit
            const targetMag = Math.sqrt(tvSpeed**2 * 2);
            const currentMag = Math.sqrt(speedX**2 + speedY**2);
            speedX += ((speedX / currentMag * targetMag) - speedX) * 0.03;
            speedY += ((speedY / currentMag * targetMag) - speedY) * 0.03;

            bounceX += speedX;
            bounceY += speedY;
            depth += speedDepth;

            // 3D Rotation steuern
            rotX += 0.2;
            rotY += 0.3;
            if (depth > 50 || depth < -50) speedDepth *= -1;

            const rect = startBtn.getBoundingClientRect();
            const headerRect = headerEl.getBoundingClientRect();
            
            // Kollision
            if (bounceX <= rect.width/2 + 20 || bounceX >= width - rect.width/2 - 20) speedX *= -1;
            if (bounceY <= headerRect.bottom + rect.height/2 || bounceY >= height - rect.height/2 - 20) speedY *= -1;

            // CSS Update
            btnWrapper.style.left = (bounceX - rect.width/2) + 'px';
            btnWrapper.style.top = (bounceY - rect.height/2) + 'px';
            
            // Das Logo selbst im Wrapper rotieren und skalieren
            const scale = 1 + (depth / 500);
            startBtn.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(${depth}px) scale(${scale})`;
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            update();
            drawCursorCoords();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', init);
        setInterval(updateTheme, 60000); 
        init(); loop();
    </script>
</body>
</html>
