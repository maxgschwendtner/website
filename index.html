<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        canvas { display: block; touch-action: none; width: 100%; height: 100%; cursor: default; }
        
        #ui { 
            position: absolute; width: 100%; top: 0; left: 0; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: space-between; 
            height: 100vh; padding: 30px; box-sizing: border-box; z-index: 10; 
        }

        .header { 
            display: flex; flex-direction: column; text-align: left; 
            font-size: 32px; font-weight: 900; line-height: 0.9; 
            letter-spacing: -1.5px; color: #000; text-transform: uppercase; 
            pointer-events: auto; 
        }

        @media (min-width: 769px) { .header { flex-direction: row; gap: 12px; } }

        .footer { text-align: right; font-size: 15px; pointer-events: auto; }
        .footer a { 
            color: #0000FF; text-decoration: none; 
            font-family: "HelveticaNeue-Light", "Helvetica Neue Light", "Helvetica Neue", Helvetica, Arial, sans-serif; 
            font-weight: 100; letter-spacing: 0.5px; -webkit-font-smoothing: antialiased; 
        }

        /* Under Construction Button */
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: none; border: none; color: #FFF000; cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            padding: 25px 35px; z-index: 11; white-space: nowrap; display: inline-block;
            text-decoration: none; transition: color 0.05s ease, opacity 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Der Textmarker-Effekt */
        #start-btn::before {
            content: ""; position: absolute; 
            top: 22px; left: 30px; right: 30px; bottom: 22px;
            background: #EAFF00; z-index: -1; border-radius: 2px; 
            display: none;
            opacity: 1;
        }

        #start-btn:hover { 
            color: #000; 
            text-decoration: underline; 
            text-underline-offset: 3px; 
            text-decoration-color: #000; 
        }

        #start-btn:hover::before { 
            display: block; 
            /* Startet die Blink-Animation erst nach 0.5s Verharren */
            animation: apple-blink 4.5s infinite;
            animation-delay: 0.5s; 
        }

        /* Blink-Logik (3x Blinken, dann Pause) */
        @keyframes apple-blink {
            0%, 10%, 20%, 30% { opacity: 1; }
            5%, 15%, 25% { opacity: 0; }
            33.1%, 100% { opacity: 1; }
        }

        @media (min-width: 769px) { #start-btn { cursor: default; } }
    </style>
</head>
<body>

    <div id="ui">
        <div class="header" id="main-header"><span>MAX</span><span>GSCHWENDTNER</span></div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>

    <button id="start-btn">UNDER CONSTRUCTION</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const headerEl = document.getElementById('main-header');

        let width, height, dpr, isPlaying = false, bounceX, bounceY, speedX, speedY;
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            if (!isMobile) {
                bounceX = width / 2; bounceY = height / 2;
                speedX = 1.6; speedY = 1.6;
                requestAnimationFrame(renderScreensaver);
            }
        }

        function pushButton() {
            const rand = Math.random();
            if (rand < 0.33) speedX *= -1; 
            else if (rand < 0.66) speedY *= -1; 
            else { speedX *= -1; speedY *= -1; }
            
            const kick = 0.9 + Math.random() * 0.4;
            speedX *= kick; speedY *= kick;
            const min = 1.2, max = 3.5;
            if (Math.abs(speedX) < min) speedX = min * Math.sign(speedX);
            if (Math.abs(speedX) > max) speedX = max * Math.sign(speedX);
            if (Math.abs(speedY) < min) speedY = min * Math.sign(speedY);
            if (Math.abs(speedY) > max) speedY = max * Math.sign(speedY);
        }

        startBtn.addEventListener('mousedown', (e) => {
            if (!isMobile) pushButton();
        });

        function updatePhysics() {
            if (isPlaying || isMobile) return;
            const rect = startBtn.getBoundingClientRect();
            const headerRect = headerEl.getBoundingClientRect();
            const uiPadding = 30;

            bounceX += speedX;
            bounceY += speedY;

            if (bounceX <= rect.width/2 + uiPadding || bounceX >= width - rect.width/2 - uiPadding) speedX *= -1;
            if (bounceY <= headerRect.bottom + rect.height/2 || bounceY >= height - rect.height/2 - uiPadding) speedY *= -1;

            startBtn.style.left = bounceX + 'px';
            startBtn.style.top = bounceY + 'px';
        }

        function renderScreensaver() {
            if (isPlaying) return;
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            for (let x = 0; x <= width; x += 40) {
                for (let y = 0; y <= height; y += 40) {
                    ctx.beginPath(); ctx.arc(x, y, 0.5, 0, Math.PI * 2); ctx.fill();
                }
            }
            updatePhysics();
            requestAnimationFrame(renderScreensaver);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
