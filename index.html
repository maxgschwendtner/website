<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: Helvetica, Arial, sans-serif; }
        canvas { display: block; }

        /* UI-Layout */
        #ui {
            position: absolute; width: 100%; top: 0; left: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; height: 100vh;
            padding: 30px; box-sizing: border-box;
            z-index: 10;
        }

        /* Name oben links: BOLD */
        .header { 
            text-align: left; 
            font-size: 32px; 
            font-weight: 900; 
            line-height: 0.9; 
            letter-spacing: -1px; 
            color: #000; 
            text-transform: uppercase;
        }

        /* Mail unten rechts */
        .footer { text-align: right; font-size: 11px; font-weight: 400; color: #000; pointer-events: auto; }
        .footer a { color: #000; text-decoration: none; }

        /* Start-Button: Nur Text, keine Umrandung */
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: none; border: none; color: #000;
            cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px;
            text-transform: uppercase;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="header">
            MAX<br>GSCHWENDTNER
        </div>
        <div class="footer">
            <a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a>
        </div>
    </div>

    <button id="start-btn">START</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        let width, height, player, platforms = [], gravity = 0.3, jumpStrength = -8;
        let maxPlatforms = 12; 
        let tilt = 0, isPlaying = false;

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            player = { x: width / 2, y: height / 2, radius: 5, vx: 0, vy: 0 };
            
            platforms = [];
            platforms.push({ x: width / 2 - 25, y: height / 2 + 40, w: 50, h: 1 }); 
            
            for(let i = 1; i < maxPlatforms; i++){
                generatePlatform();
            }
        }

        function generatePlatform() {
            let lastY = platforms.length > 0 ? platforms[platforms.length-1].y : height;
            let newY = lastY - (height / 12); // Noch engere Abstände für besseren Flow
            
            platforms.push({
                x: Math.random() * (width - 50),
                y: newY,
                w: 50,
                h: 1
            });
        }

        function handleOrientation(event) { tilt = event.gamma; }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
            startBtn.style.display = 'none';
            isPlaying = true;
            animate();
        });

        function animate() {
            if(!isPlaying) return;
            ctx.clearRect(0, 0, width, height);

            player.vx = tilt * 0.5;
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = width;
            if (player.x > width) player.x = 0;

            if (player.y < height / 2) {
                let diff = height / 2 - player.y;
                player.y = height / 2;
                platforms.forEach(p => p.y += diff);
            }

            ctx.fillStyle = '#000';
            platforms.forEach((p) => {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                if (player.vy > 0 && player.x > p.x && player.x < p.x + p.w && player.y + player.radius > p.y && player.y + player.radius < p.y + 8) {
                    player.vy = jumpStrength;
                }
            });

            platforms = platforms.filter(p => p.y < height);
            while(platforms.length < maxPlatforms) generatePlatform();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            if (player.y > height + 50) init();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
