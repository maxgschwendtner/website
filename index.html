<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        canvas { 
            display: block; 
            touch-action: none; 
            width: 100%; 
            height: 100%; 
            cursor: default;
        }

        #ui {
            position: absolute; width: 100%; top: 0; left: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; height: 100vh;
            padding: 30px; box-sizing: border-box; z-index: 10;
        }

        .header { 
            display: flex;
            flex-direction: column;
            text-align: left; 
            font-size: 32px; 
            font-weight: 900; 
            line-height: 0.9; 
            letter-spacing: -1.5px; 
            color: #000; 
            text-transform: uppercase;
        }

        @media (min-width: 769px) {
            .header { flex-direction: row; gap: 12px; }
        }

        .footer { 
            text-align: right; 
            font-size: 14px; 
            font-weight: 500; 
            pointer-events: auto; 
        }
        .footer a { 
            color: #0000FF; 
            text-decoration: none; 
        }

        #start-btn {
            position: absolute; 
            /* Startposition wird per JS gesteuert */
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            background: none; border: none; 
            color: #FF0000;
            cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            padding: 20px; z-index: 11;
            white-space: nowrap;
            transition: opacity 0.1s ease;
            /* Wichtig für die Bewegung */
            margin: 0;
        }

        @media (min-width: 769px) { #start-btn { cursor: default; } }
    </style>
</head>
<body>

        </div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>
