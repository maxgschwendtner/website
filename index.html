<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Gschwendtner</title>
    <style>
        body { 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0;
            background-color: #fff;
            color: #000;
            -webkit-font-smoothing: antialiased;
            min-height: 5000px; 
        }

        /* Name bleibt oben links fixiert */
        header {
            position: fixed;
            top: 0;
            left: 0;
            padding: 30px 40px;
            z-index: 100;
        }

        h1 { 
            font-weight: 800; 
            font-size: 3.5rem; 
            margin: 0;
            text-transform: uppercase; 
            letter-spacing: -0.04em;
            line-height: 0.9;
        }

        /* Mail-Adresse unten rechts fixiert */
        .mail-link {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 1rem;
            text-decoration: none;
            color: #000;
            font-weight: 500;
            z-index: 100;
            background: rgba(255,255,255,0.8);
            padding: 5px;
        }

        .mail-link:hover {
            opacity: 0.5;
        }

        /* Scroll-Inhalt */
        .content {
            padding-top: 300px;
        }

        .dot-row {
            height: 50vh; 
            display: flex;
            position: relative;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #000;
            border-radius: 50%;
        }

        /* "Random" Positionen für die Punkte */
        .p1 { margin-left: 12%; }
        .p2 { margin-left: 78%; }
        .p3 { margin-left: 35%; }
        .p4 { margin-left: 92%; }
        .p5 { margin-left: 8%; }
        .p6 { margin-left: 55%; }
        .p7 { margin-left: 22%; }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            header, .mail-link { padding: 20px; }
            .mail-link { bottom: 20px; right: 20px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MAX GSCHWENDTNER</h1>
    </header>

    <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail@maxgschwendtner.com</a>

    <div class="content">
        <div class="dot-row p1"><div class="dot"></div></div>
        <div class="dot-row p4"><div class="dot"></div></div>
        <div class="dot-row p7"><div class="dot"></div></div>
        <div class="dot-row p2"><div class="dot"></div></div>
        <div class="dot-row p5"><div class="dot"></div></div>
        <div class="dot-row p3"><div class="dot"></div></div>
        <div class="dot-row p6"><div class="dot"></div></div>
        <div class="dot-row p1"><div class="dot"></div></div>
        <div class="dot-row p4"><div class="dot"></div></div>
        <div class="dot-row p2"><div class="dot"></div></div>
        </div>

</body>
</html>
