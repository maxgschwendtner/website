<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Gschwendtner | Deep Space</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Inter", sans-serif;
            background-color: #fff;
            overflow: hidden;
            /* Rhino Gumball Cursor */
            cursor: url('data:image/svg+xml;utf8,<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><line x1="16" y1="16" x2="32" y2="16" stroke="red" stroke-width="1.5"/><line x1="16" y1="16" x2="16" y2="0" stroke="green" stroke-width="1.5"/><circle cx="16" cy="16" r="2.5" fill="white" stroke="black" stroke-width="1"/></svg>') 16 16, auto;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            padding: 30px 40px;
            z-index: 1000;
            pointer-events: none;
        }

        h1 {
            font-weight: 800;
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            line-height: 0.9;
            color: #000;
        }

        .mail-link {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 0.9rem;
            text-decoration: none;
            color: #000;
            font-weight: 500;
            z-index: 1000;
            letter-spacing: 0.05em;
        }

        #scroll-container {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            position: relative;
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        #scroll-container::-webkit-scrollbar { display: none; }

        #canvas {
            /* Hintergrund vervierfacht (von 8000 auf 16000) */
            width: 16000px; 
            height: 16000px;
            position: relative;
            background-color: #ffffff;
        }

        .dot {
            position: absolute;
            background-color: #000; /* Alle Punkte schwarz */
            border-radius: 50%;
            /* Schnellerer "Pop"-Effekt */
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.1s ease;
        }

        .dot.popped {
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MAX GSCHWENDTNER</h1>
    </header>

    <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail@maxgschwendtner.com</a>

    <div id="scroll-container">
        <div id="canvas"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const container = document.getElementById('scroll-container');

        // --- Konfiguration ---
        // Trotz riesiger Fläche halten wir die Anzahl gering für vereinzelte Sichtungen
        const numberOfDots = 120; 

        function createDot() {
            const dot = document.createElement('div');
            dot.className = 'dot';

            // Punkte viel kleiner (4px bis 12px)
            const size = Math.random() * (12 - 4) + 4;
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;

            // Zufällige Verteilung auf der 16.000px Leinwand
            const x = Math.random() * (canvas.offsetWidth - size);
            const y = Math.random() * (canvas.offsetHeight - size);
            
            dot.style.left = `${x}px`;
            dot.style.top = `${y}px`;

            // Platzen-Interaktion
            dot.addEventListener('mouseenter', () => {
                dot.classList.add('popped');
                setTimeout(() => dot.remove(), 200);
            });

            canvas.appendChild(dot);
        }

        // Punkte generieren
        for (let i = 0; i < numberOfDots; i++) {
            createDot();
        }

        // Startposition in der absoluten Mitte der 16.000px
        window.addEventListener('load', () => {
            const startX = (canvas.offsetWidth - window.innerWidth) / 2;
            const startY = (canvas.offsetHeight - window.innerHeight) / 2;
            container.scrollLeft = startX;
            container.scrollTop = startY;
        });
    </script>
</body>
</html>
