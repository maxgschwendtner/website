<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner - Jump</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; width: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; height: 100vh;
        }
        .header { padding: 20px; text-align: center; font-weight: bold; letter-spacing: 2px; }
        .footer { padding: 20px; text-align: center; font-size: 12px; }
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; background: #000; color: #fff; border: none; cursor: pointer; pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="header">MAX GSCHWENDTNER</div>
        <div class="footer">MAIL@MAXGSCHWENDTNER.COM</div>
    </div>

    <button id="start-btn">Start & Sensoren erlauben</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        let width, height, player, platforms = [], gravity = 0.4, jumpStrength = -10;
        let tilt = 0;

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            player = {
                x: width / 2 - 10,
                y: height / 2,
                w: 20,
                h: 20,
                vx: 0,
                vy: 0
            };

            // Start-Plattform
            platforms = [{ x: width / 2 - 25, y: height / 2 + 50, w: 50, h: 10 }];
        }

        // Steuerung: Tippen erzeugt Plattformen
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            platforms.push({ x: touch.clientX - 25, y: touch.clientY, w: 50, h: 10 });
        });

        // Steuerung: Neigen (iPhone)
        function handleOrientation(event) {
            tilt = event.gamma; // Neigung links/rechts
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
            startBtn.style.display = 'none';
            update();
        });

        function update() {
            ctx.clearRect(0, 0, width, height);

            // Spieler bewegen
            player.vx = tilt * 0.5;
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            // Bildschirm-Rand-Teleport (wie in Doodle Jump)
            if (player.x < 0) player.x = width;
            if (player.x > width) player.x = 0;

            // Kamera-Effekt: Wenn der Spieler oben ist, schiebe alles nach unten
            if (player.y < height / 2) {
                let diff = height / 2 - player.y;
                player.y = height / 2;
                platforms.forEach(p => p.y += diff);
            }

            // Zeichne Plattformen (Schwarze Punkte/Balken)
            ctx.fillStyle = '#000';
            platforms.forEach((p, index) => {
                ctx.fillRect(p.x, p.y, p.w, p.h);

                // Kollision
                if (player.vy > 0 && 
                    player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10) {
                    player.vy = jumpStrength;
                }
            });

            // Zeichne Spieler (Gelber Punkt)
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 10, 0, Math.PI * 2);
            ctx.fill();

            // Game Over Reset
            if (player.y > height) init();

            requestAnimationFrame(update);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
