<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        canvas { display: block; touch-action: none; width: 100%; height: 100%; }

        #ui {
            position: absolute; width: 100%; top: 0; left: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; height: 100vh;
            padding: 30px; box-sizing: border-box; z-index: 10;
        }

        /* Flexbox für das Header-Layout */
        .header { 
            display: flex;
            flex-direction: column; /* Standard: Untereinander (Mobil) */
            text-align: left; 
            font-size: 32px; 
            font-weight: 900; 
            line-height: 0.9; 
            letter-spacing: -1.5px; 
            color: #000; 
            text-transform: uppercase;
        }

        /* Desktop-Anpassung: Nebeneinander */
        @media (min-width: 769px) {
            .header {
                flex-direction: row;
                gap: 12px; /* Abstand zwischen Vor- und Nachname */
            }
        }

        .footer { text-align: right; font-size: 11px; font-weight: 400; color: #000; pointer-events: auto; }
        .footer a { color: #000; text-decoration: none; }

        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: none; border: none; color: #000; cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            padding: 20px; z-index: 11;
        }

        @media (min-width: 769px) { #start-btn { cursor: default; } }
    </style>
</head>
<body>

    <div id="ui">
        <div class="header">
            <span>MAX</span>
            <span>GSCHWENDTNER</span>
        </div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>

    <button id="start-btn">UNDER CONSTRUCTION</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        let width, height, dpr, player, platforms = [], enemies = [], gravity = 0.3, jumpStrength = -9;
        let tilt = 0, isPlaying = false, goldenRatio, totalHeight = 0; 
        let mouseX = 0, mouseY = 0; // Für Web-Koordinaten
        
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            ctx.textBaseline = 'middle';
            platforms = [];
            enemies = [];
            totalHeight = 0;
            player = null;

            if (!isMobile) {
                // Desktop-spezifische Render-Schleife starten (für Raster & Maus-Koordinaten)
                requestAnimationFrame(renderStaticWeb);
            }
        }

        // Mouse Tracking für Desktop-Koordinaten
        window.addEventListener('mousemove', (e) => {
            if (!isMobile) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        startBtn.addEventListener('click', () => {
            if (!isMobile) return; 
            startBtn.style.display = 'none';
            isPlaying = true;
            goldenRatio = height * 0.618; 
            player = { 
                x: width / 2, y: height * 0.2,
                char: alphabet[Math.floor(Math.random() * alphabet.length)], 
                size: 20, vx: 0, vy: 0,
                trail: []
            };

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', (e) => tilt = e.gamma);
                });
            } else {
                window.addEventListener('deviceorientation', (e) => tilt = e.gamma);
            }
            animate();
        });

        function drawGrid(yOffset = 0) {
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            const gridSize = 40;
            const offset = yOffset % gridSize;
            for (let x = 0; x <= width; x += gridSize) {
                for (let y = offset; y <= height; y += gridSize) {
                    ctx.beginPath();
                    ctx.arc(x, y, 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawCoords(x, y, labelY) {
            ctx.font = "400 8px monospace";
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.textAlign = 'center';
            ctx.fillText(`X:${Math.round(x)} Y:${Math.round(labelY)}`, x, y + 20);
        }

        // Stille Render-Schleife für Desktop (Raster & Maus)
        function renderStaticWeb() {
            if (isPlaying || isMobile) return;
            ctx.clearRect(0, 0, width, height);
            drawGrid(0);
            drawCoords(mouseX, mouseY, mouseY);
            requestAnimationFrame(renderStaticWeb);
        }

        function animate() {
            if(!isPlaying) return;
            ctx.clearRect(0, 0, width, height);

            drawGrid(totalHeight);

            // Mobil-Physik
            player.vx = tilt * 0.75; 
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;
            
            if (player.x < 0) player.x = width; if (player.x > width) player.x = 0;

            if (player.y < goldenRatio) {
                let diff = goldenRatio - player.y;
                player.y = goldenRatio;
                totalHeight += diff;
                platforms.forEach(p => p.y += diff);
                enemies.forEach(e => e.y += diff);
            }

            // Motion Trails
            player.trail.unshift({x: player.x, y: player.y});
            if (player.trail.length > 8) player.trail.pop();
            player.trail.forEach((pos, i) => {
                ctx.fillStyle = `rgba(0,0,0,${0.15 - (i * 0.02)})`;
                ctx.font = `900 ${player.size}px 'Helvetica Neue'`;
                ctx.fillText(player.char, pos.x, pos.y);
            });

            // Gegner
            if (totalHeight > 600 && Math.random() < 0.02) {
                enemies.push({
                    x: Math.random() < 0.5 ? -25 : width + 25,
                    y: Math.random() * (height * 0.75),
                    vx: (Math.random() * 2 + 2) * (Math.random() < 0.5 ? 1 : -1), 
                    radius: 4.5
                });
            }

            ctx.fillStyle = '#000';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, 0.5);
                if (player.vy > 0 && player.x > p.x - 5 && player.x < p.x + p.w + 5 && player.y > p.y && player.y < p.y + 15) {
                    player.vy = jumpStrength;
                    player.char = alphabet[Math.floor(Math.random() * alphabet.length)];
                }
            });

            enemies.forEach(e => {
                e.x += e.vx;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.fill();
                let dx = player.x - e.x; let dy = player.y - e.y;
                if (Math.sqrt(dx*dx + dy*dy) < 15) gameOver();
            });

            platforms = platforms.filter(p => p.y < height);
            enemies = enemies.filter(e => e.x > -60 && e.x < width + 60 && e.y < height);

            ctx.fillStyle = '#000';
            ctx.font = `900 ${player.size}px 'Helvetica Neue'`;
            ctx.textAlign = 'center';
            ctx.fillText(player.char, player.x, player.y);

            drawCoords(player.x, player.y, totalHeight);

            if (player.y > height + 50) gameOver();
            else requestAnimationFrame(animate);
        }

        function gameOver() {
            isPlaying = false;
            startBtn.style.display = 'block';
            init();
        }

        window.addEventListener('touchstart', (e) => {
            if(!isPlaying || !isMobile) return;
            const y = e.touches[0].clientY;
            if (!platforms.some(p => Math.abs(p.y - y) < 35)) {
                platforms.push({ x: e.touches[0].clientX - 25, y: y, w: 50, h: 0.5 });
            }
        });

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
