<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner - Architectural Precision</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-blue: #0000FF;
            --info-color: rgba(0,0,0,0.45);
        }

        [data-theme='dark'] {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-blue: #5555FF;
            --info-color: rgba(255,255,255,0.45);
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            transition: background 2s ease; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            cursor: default; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: geometricPrecision;
        }

        canvas { 
            display: block; width: 100%; height: 100%; 
            pointer-events: none; position: absolute; 
            top: 0; left: 0; z-index: 1; /* Hinter dem UI */
        }
        
        #ui { 
            position: absolute; width: 100%; height: 100vh; 
            top: 0; left: 0; pointer-events: none; 
            display: flex; flex-direction: column; 
            justify-content: space-between; 
            padding: 30px 35px; /* Etwas mehr Platz für den Header */
            box-sizing: border-box; 
            z-index: 10; /* Über dem Canvas */
        }
        
        .header { 
            display: flex; flex-direction: column; text-align: left; 
            font-size: 34px; font-weight: 800; line-height: 0.82; 
            letter-spacing: -2.1px; 
            color: var(--text-color); text-transform: uppercase; 
            pointer-events: auto; 
            transition: color 2s ease;
            width: fit-content;
        }
        @media (min-width: 769px) { .header { flex-direction: row; gap: 10px; } }
        
        .footer { text-align: right; font-size: 14px; pointer-events: auto; }
        .footer a { color: var(--accent-blue); text-decoration: none; font-weight: 600; transition: color 2s ease; }

        #start-btn {
            position: absolute; top: 0; left: 0;
            background: none; border: none; color: #FFF000; cursor: pointer; pointer-events: auto;
            font-size: 13px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase;
            padding: 25px 35px; z-index: 11; white-space: nowrap; display: inline-block;
            will-change: left, top;
            transition: color 0.1s ease;
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background: #EAFF00; z-index: -1; border-radius: 1px; display: none;
        }

        #start-btn:hover { color: #000000; }
        #start-btn:hover::before { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header" id="main-header"><span>MAX</span><span>GSCHWENDTNER</span></div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>
    
    <button id="start-btn"><span>UNDER CONSTRUCTION</span></button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const headerEl = document.getElementById('main-header');

        let width, height, dpr;
        const tvSpeed = 1.05; 
        let bounceX, bounceY, speedX = tvSpeed, speedY = tvSpeed; 
        let mouseX = -2000, mouseY = -2000;
        let isHovering = false;
        let pushLock = false; 

        function updateTheme() {
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 6;
            document.body.setAttribute('data-theme', isNight ? 'dark' : 'light');
        }

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            
            // Startposition unterhalb des Headers sicherstellen
            const hRect = headerEl.getBoundingClientRect();
            bounceX = width / 2; 
            bounceY = hRect.bottom + 100; 
            
            updateTheme();
        }

        window.addEventListener('mousemove', (e) => { 
            mouseX = e.clientX; mouseY = e.clientY; 
        });

        startBtn.addEventListener('mousedown', () => {
            const r = Math.random();
            const boost = 1.4;
            if (r < 0.33) { speedX *= -boost; speedY *= -boost; } 
            else if (r < 0.66) { let t = speedX; speedX = -speedY * boost; speedY = t * boost; } 
            else { let t = speedX; speedX = speedY * boost; speedY = -t * boost; }
            pushLock = true;
            setTimeout(() => { pushLock = false; }, 750); 
        });

        startBtn.addEventListener('mouseenter', () => { isHovering = true; });
        startBtn.addEventListener('mouseleave', () => { isHovering = false; });

        function update() {
            let dx = bounceX - mouseX;
            let dy = bounceY - mouseY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (!isHovering && !pushLock && dist < 130) {
                speedX += dx * 0.0025;
                speedY += dy * 0.0025;
            }

            const targetMag = Math.sqrt(tvSpeed**2 * 2);
            const currentMag = Math.sqrt(speedX**2 + speedY**2);
            speedX += ((speedX / currentMag * targetMag) - speedX) * 0.035;
            speedY += ((speedY / currentMag * targetMag) - speedY) * 0.035;

            const rect = startBtn.getBoundingClientRect();
            const hRect = headerEl.getBoundingClientRect();
            
            bounceX += speedX;
            bounceY += speedY;

            // WICHTIG: Bounce-Grenzen inkl. Header-Abstand
            if (bounceX <= rect.width/2 + 20 || bounceX >= width - rect.width/2 - 20) speedX *= -1;
            // Der Button darf nicht höher als die Unterkante des Headers (plus Sicherheitsabstand)
            if (bounceY <= hRect.bottom + rect.height/2 + 10 || bounceY >= height - rect.height/2 - 20) speedY *= -1;

            startBtn.style.left = (bounceX - rect.width/2) + 'px';
            startBtn.style.top = (bounceY - rect.height/2) + 'px';
        }

        function drawCursorCoords() {
            ctx.save();
            ctx.translate(mouseX + 15, mouseY + 15);
            ctx.font = "400 9px monospace";
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--info-color');
            ctx.fillText(`X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`, 0, 10);
            ctx.restore();
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            update();
            drawCursorCoords();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', init);
        setInterval(updateTheme, 60000); 
        init(); loop();
    </script>
</body>
</html>
