<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #000000;
            --accent-blue: #0066cc;
            --info-color: rgba(0,0,0,0.35);
            --pure-yellow: #FFEA00;
            --neon-hover: #EAFF00;
            --logo-size: 32px;
        }

        [data-theme='dark'] {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --accent-blue: #2997ff;
            --info-color: rgba(255,255,255,0.35);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background-color: var(--bg-color); 
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            -webkit-font-smoothing: antialiased;
            touch-action: none;
        }

        /* --- DAS ANIMIERTE LOGO --- */
        #logo {
            position: fixed; top: 35px; left: 35px; z-index: 100;
            font-size: var(--logo-size); font-weight: 800; 
            letter-spacing: -0.05em; color: var(--text-primary); 
            text-transform: uppercase;
            transition: color 0.6s ease;
            display: block;
        }

        #logo .container {
            position: relative;
            display: flex;
            flex-direction: column; /* Grundstruktur ist untereinander */
        }

        #logo span {
            display: block;
            line-height: 0.85;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Tag-Version: GSCHWENDTNER wird nach rechts geschoben */
        #logo span.last {
            transform: translate(75px, -0.85em); /* Schiebt es neben den Vornamen */
        }

        /* Nacht-Version: Alles auf Null (untereinander) */
        [data-theme='dark'] #logo span.last {
            transform: translate(0, 0);
        }

        @media (max-width: 600px) {
            :root { --logo-size: 24px; }
            #logo span.last { transform: translate(58px, -0.85em); }
        }

        /* --- RESTLICHE ELEMENTE --- */
        #theme-toggle {
            position: fixed; top: 40px; right: 35px; z-index: 100;
            width: 14px; height: 14px; 
            border: 1px solid var(--text-primary); 
            background: transparent;
            border-radius: 50%; cursor: pointer;
            transition: border-color 0.6s ease, transform 0.2s ease;
        }

        #footer {
            position: fixed; bottom: 35px; right: 35px; z-index: 100;
            font-size: 14px; font-weight: 500;
        }
        #footer a { color: var(--accent-blue); text-decoration: none; transition: color 0.6s ease; }

        #start-btn {
            position: absolute; z-index: 50;
            background: none; border: none; 
            color: var(--pure-yellow); 
            cursor: pointer; font-size: 13px; font-weight: 800; 
            letter-spacing: 2.2px; text-transform: uppercase;
            padding: 25px 35px; white-space: nowrap; 
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background-color: var(--neon-hover); 
            z-index: -1; border-radius: 1px; display: none;
        }
        #start-btn:hover { color: #000000 !important; }
        #start-btn:hover::before { display: block; }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body data-theme="light">

    <div id="logo">
        <div class="container">
            <span class="first">MAX</span>
            <span class="last">GSCHWENDTNER</span>
        </div>
    </div>

    <div id="theme-toggle"></div>
    <div id="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    
    <button id="start-btn"><span>UNDER CONSTRUCTION</span></button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const themeToggle = document.getElementById('theme-toggle');

        let width, height, dpr;
        const baseSpeed = 1.05; 
        let bounceX, bounceY, speedX, speedY; 
        let mouseX = -1000, mouseY = -1000;
        let lerpX = -1000, lerpY = -1000;
        let isHovering = false, pushLock = false;

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            document.body.setAttribute('data-theme', target);
        });

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.scale(dpr, dpr);
            bounceX = width / 2; bounceY = height / 2;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.sqrt(baseSpeed**2 * 2);
            speedX = Math.cos(angle) * speed; speedY = Math.sin(angle) * speed;
        }

        const updateMouse = (e) => {
            mouseX = (e.clientX || (e.touches && e.touches[0].clientX));
            mouseY = (e.clientY || (e.touches && e.touches[0].clientY));
            if (lerpX < 0) { lerpX = mouseX; lerpY = mouseY; }
        };
        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchstart', updateMouse);

        startBtn.addEventListener('mousedown', () => {
            speedX *= 1.6; speedY *= 1.6;
            pushLock = true;
            setTimeout(() => pushLock = false, 500);
        });

        startBtn.addEventListener('mouseenter', () => isHovering = true);
        startBtn.addEventListener('mouseleave', () => isHovering = false);

        function update() {
            lerpX += (mouseX - lerpX) * 0.12; // Gleit-Effekt Koordinaten
            lerpY += (mouseY - lerpY) * 0.12;

            let dx = bounceX - mouseX, dy = bounceY - mouseY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (!isHovering && !pushLock && dist < 140) {
                speedX += dx * 0.004; speedY += dy * 0.004;
            }

            const targetMag = Math.sqrt(baseSpeed**2 * 2);
            const currentMag = Math.sqrt(speedX**2 + speedY**2) || 1;
            speedX += ((speedX / currentMag * targetMag) - speedX) * 0.05;
            speedY += ((speedY / currentMag * targetMag) - speedY) * 0.05;

            bounceX += speedX; bounceY += speedY;

            const btnRect = startBtn.getBoundingClientRect();
            if (bounceX < btnRect.width/2 + 20 || bounceX > width - btnRect.width/2 - 20) speedX *= -1;
            if (bounceY < 150 || bounceY > height - btnRect.height/2 - 20) speedY *= -1;

            startBtn.style.left = (bounceX - btnRect.width/2) + 'px';
            startBtn.style.top = (bounceY - btnRect.height/2) + 'px';
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            ctx.font = "500 11px ui-monospace, SFMono-Regular, Menlo, monospace";
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--info-color');
            if (mouseX > 0 && mouseX < width) {
                ctx.fillText(`X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`, lerpX + 12, lerpY + 18);
            }
            update();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', init);
        window.onload = () => { init(); loop(); };
    </script>
</body>
</html>
