<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner - 3D Flying Construction</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-blue: #0000FF;
            --info-color: rgba(0,0,0,0.4);
            --rotation-x: 0deg;
            --rotation-y: 0deg;
            --scale-z: 1;
        }

        [data-theme='dark'] {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-blue: #5555FF;
            --info-color: rgba(255,255,255,0.4);
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            transition: background 2s ease; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            cursor: default; 
            perspective: 1000px; /* 3D Perspektive für den Body */
        }

        canvas { display: block; width: 100%; height: 100%; pointer-events: none; position: absolute; top: 0; left: 0; }
        
        #ui { position: absolute; width: 100%; top: 0; left: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; padding: 30px; box-sizing: border-box; z-index: 10; }
        
        .header { 
            display: flex; flex-direction: column; text-align: left; font-size: 32px; font-weight: 900; line-height: 0.9; letter-spacing: -1.5px; 
            color: var(--text-color); text-transform: uppercase; pointer-events: auto; 
            transition: color 2s ease;
        }
        @media (min-width: 769px) { .header { flex-direction: row; gap: 12px; } }
        
        .footer { text-align: right; font-size: 15px; pointer-events: auto; }
        .footer a { 
            color: var(--accent-blue); 
            text-decoration: none; 
            font-weight: 600; 
            letter-spacing: 0.2px; 
            transition: color 2s ease;
        }

        /* Container für das 3D fliegende Logo */
        #under-construction-container {
            position: absolute; top: 0; left: 0;
            transform-style: preserve-3d;
            transition: transform 0.1s linear; /* Glatte Transformations-Updates */
        }

        #start-btn {
            background: none; border: none; color: #FFF000; cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            padding: 25px 35px; z-index: 11; white-space: nowrap; display: inline-block;
            transition: color 0.1s ease;
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background: #EAFF00; z-index: -1; border-radius: 2px; display: none;
        }

        #start-btn:hover { color: #000; }
        #start-btn:hover::before { display: block; }

        /* Blinken: Nur Schrift weg, kein Unterstrich */
        #start-btn:hover span {
            animation: text-blink 4.5s infinite;
            animation-delay: 3s;
        }

        @keyframes text-blink {
            0%, 10%, 20%, 30% { opacity: 1; }
            5%, 15%, 25% { opacity: 0; }
            33.1%, 100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header" id="main-header"><span>MAX</span><span>GSCHWENDTNER</span></div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>
    
    <div id="under-construction-container">
        <button id="start-btn"><span>UNDER CONSTRUCTION</span></button>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const underConstructionContainer = document.getElementById('under-construction-container');
        const headerEl = document.getElementById('main-header');

        let width, height, dpr;
        const tvSpeed = 1.05; 
        const tvSpeedZ = 0.6; // Geschwindigkeit in der Tiefe
        let bounceX, bounceY, bounceZ = 0, speedX = tvSpeed, speedY = tvSpeed, speedZ = tvSpeedZ;
        let rotationX = 0, rotationY = 0, rotationZ = 0;
        const rotationSpeed = 0.15; // Rotationsgeschwindigkeit
        let mouseX = -2000, mouseY = -2000;
        let isHovering = false, hoverStartTime = 0;

        function updateTheme() {
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 6;
            document.body.setAttribute('data-theme', isNight ? 'dark' : 'light');
        }

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            bounceX = width / 2; bounceY = height / 2; bounceZ = 0;
            updateTheme();
        }

        window.addEventListener('mousemove', (e) => { 
            mouseX = e.clientX; 
            mouseY = e.clientY; 
        });

        startBtn.addEventListener('mousedown', () => {
            speedX *= -1;
            speedY *= -1;
            speedZ *= -1; // Richtungsänderung auch in der Tiefe
            // Kleiner zufälliger Impuls
            speedX += (Math.random() - 0.5) * 0.4;
            speedY += (Math.random() - 0.5) * 0.4;
            speedZ += (Math.random() - 0.5) * 0.3;
        });

        startBtn.addEventListener('mouseenter', () => { 
            isHovering = true; 
            hoverStartTime = Date.now(); 
        });
        startBtn.addEventListener('mouseleave', () => { 
            isHovering = false; 
        });

        function drawGrid() {
            const timeElapsed = isHovering ? (Date.now() - hoverStartTime) / 1000 : 0;
            const useGR = timeElapsed > 3;
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            ctx.fillStyle = isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.12)";
            
            const spacing = 40;
            for (let x = 0; x <= width; x += spacing) {
                for (let y = 0; y <= height; y += spacing) {
                    let gx = x, gy = y;
                    if (useGR) {
                        gx += Math.sin(x * 1.618) * 4;
                        gy += Math.cos(y * 1.618) * 4;
                    }
                    ctx.beginPath(); ctx.arc(gx, gy, 0.7, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

        function drawCursorCoords() {
            ctx.save();
            ctx.translate(mouseX + 15, mouseY + 15);
            ctx.font = "400 10px monospace";
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--info-color');
            ctx.textAlign = "left";
            ctx.fillText(`X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`, 0, 10);
            ctx.restore();
        }

        function update() {
            // Update 3D Flugpfad und Rotationen
            bounceX += speedX;
            bounceY += speedY;
            bounceZ += speedZ;
            rotationX += rotationSpeed;
            rotationY += rotationSpeed * 0.7; // Unregelmäßigere Rotation
            rotationZ += rotationSpeed * 0.5;

            // Update 3D Transformations-Variablen im CSS
            underConstructionContainer.style.setProperty('--rotation-x', `${rotationX}deg`);
            underConstructionContainer.style.setProperty('--rotation-y', `${rotationY}deg`);
            const scaleZ = 1 + (bounceZ / 200) * 0.5; // Skalierung basierend auf der Tiefe
            underConstructionContainer.style.setProperty('--scale-z', scaleZ);

            // Anwenden der 3D-Transformationen auf den Container
            const transform = `translate3d(${bounceX}px, ${bounceY}px, ${bounceZ}px) rotateX(${rotationX}deg) rotateY(${rotationY}deg) scale(${scaleZ})`;
            underConstructionContainer.style.transform = transform;

            // Berechnen der projizierten 2D-Position und Bounding Box für Interaktionen
            const rect = startBtn.getBoundingClientRect();
            const projectedX = rect.left + rect.width / 2;
            const projectedY = rect.top + rect.height / 2;
            let dxCoords = projectedX - mouseX;
            let dyCoords = projectedY - mouseY;
            let distCoords = Math.sqrt(dxCoords * dxCoords + dyCoords * dyCoords);

            // SEHR LEICHTE SCHUBS-LOGIK: Basierend auf der projizierten 2D-Entfernung
            if (!isHovering && distCoords < 120) {
                const pushStrength = 0.002; 
                speedX += dxCoords * pushStrength;
                speedY += dyCoords * pushStrength;
                speedZ += (dxCoords * pushStrength) * (dyCoords * pushStrength) * 0.01; // Kleiner Effekt auf Z
            }

            // Sanfte Rückkehr zur Vintage-TV-Geschwindigkeit (auch in der Tiefe)
            const targetMag = Math.sqrt(tvSpeed**2 * 2 + tvSpeedZ**2);
            const currentMag = Math.sqrt(speedX**2 + speedY**2 + speedZ**2);
            
            speedX += ((speedX / currentMag * targetMag) - speedX) * 0.03;
            speedY += ((speedY / currentMag * targetMag) - speedY) * 0.03;
            speedZ += ((speedZ / currentMag * targetMag) - speedZ) * 0.02; // Etwas langsamere Rückkehr in Z

            const headerRect = headerEl.getBoundingClientRect();
            
            // Wand-Abprall an den 2D-Rändern
            if (bounceX <= rect.width/2 + 20 || bounceX >= width - rect.width/2 - 20) speedX *= -1;
            if (bounceY <= headerRect.bottom + rect.height/2 || bounceY >= height - rect.height/2 - 20) speedY *= -1;

            // Abprall an fiktiven Z-Ebenen (nach vorne und hinten)
            if (bounceZ <= -100 || bounceZ >= 100) speedZ *= -1;
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            update();
            drawCursorCoords();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', init);
        setInterval(updateTheme, 60000); 
        init(); loop();
    </script>
</body>
</html>
