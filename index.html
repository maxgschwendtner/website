<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* Cursor im Web unsichtbar machen */
        canvas { 
            display: block; 
            touch-action: none; 
            width: 100%; 
            height: 100%; 
            cursor: none; 
        }

        #ui {
            position: absolute; width: 100%; top: 0; left: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; height: 100vh;
            padding: 30px; box-sizing: border-box; z-index: 10;
        }

        .header { 
            display: flex;
            flex-direction: column;
            text-align: left; 
            font-size: 32px; 
            font-weight: 900; 
            line-height: 0.9; 
            letter-spacing: -1.5px; 
            color: #000; 
            text-transform: uppercase;
        }

        @media (min-width: 769px) {
            .header { flex-direction: row; gap: 12px; }
        }

        .footer { text-align: right; font-size: 11px; font-weight: 400; color: #000; pointer-events: auto; }
        .footer a { color: #000; text-decoration: none; }

        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: none; border: none; color: #000; cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            padding: 20px; z-index: 11;
            white-space: nowrap;
        }

        @media (min-width: 769px) { #start-btn { cursor: default; } }
    </style>
</head>
<body>

    <div id="ui">
        <div class="header">
            <span>MAX</span>
            <span>GSCHWENDTNER</span>
        </div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>

    <button id="start-btn">UNDER CONSTRUCTION</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        let width, height, dpr, player, platforms = [], enemies = [], gravity = 0.3, jumpStrength = -9;
        let tilt = 0, isPlaying = false, goldenRatio, totalHeight = 0; 
        let mouseX = -100, mouseY = -100; // Start außerhalb des Sichtfelds
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            ctx.textBaseline = 'middle';
            platforms = [];
            enemies = [];
            totalHeight = 0;
            player = null;
            if (!isMobile) requestAnimationFrame(renderStaticWeb);
        }

        window.addEventListener('mousemove', (e) => {
            if (!isMobile) { mouseX = e.clientX; mouseY = e.clientY; }
        });

        startBtn.addEventListener('click', () => {
            if (!isMobile) return; 
            startBtn.style.display = 'none';
            isPlaying = true;
            goldenRatio = height * 0.618; 
            player = { x: width / 2, y: height * 0.2, vx: 0, vy: 0 };

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', (e) => tilt = e.gamma);
                });
            } else {
                window.addEventListener('deviceorientation', (e) => tilt = e.gamma);
            }
            animate();
        });

        function drawGrid(yOffset = 0) {
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            const gridSize = 40;
            const offset = yOffset % gridSize;
            for (let x = 0; x <= width; x += gridSize) {
                for (let y = offset; y <= height; y += gridSize) {
                    ctx.beginPath();
                    ctx.arc(x, y, 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawCoords(x, y, labelY, showDot = false) {
            // Kleiner Zielpunkt in der Mitte
            if(showDot) {
                ctx.fillStyle = "#000";
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Koordinaten-Text (etwas größer: 11px)
            ctx.font = "400 11px monospace";
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.textAlign = 'center';
            ctx.fillText(`X:${Math.round(x)} Y:${Math.round(labelY)}`, x, y + 22);
        }

        function renderStaticWeb() {
            if (isPlaying || isMobile) return;
            ctx.clearRect(0, 0, width, height);
            drawGrid(0);
            drawCoords(mouseX, mouseY, mouseY, true);
            requestAnimationFrame(renderStaticWeb);
        }

        function animate() {
            if(!isPlaying) return;
            ctx.clearRect(0, 0, width, height);
            drawGrid(totalHeight);

            player.vx = tilt * 0.75; 
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;
            
            if (player.x < 0) player.x = width; if (player.x > width) player.x = 0;

            if (player.y < goldenRatio) {
                let diff = goldenRatio - player.y;
                player.y = goldenRatio;
                totalHeight += diff;
                platforms.forEach(p => p.y += diff);
                enemies.forEach(e => e.y += diff);
            }

            if (totalHeight > 600 && Math.random() < 0.02) {
                enemies.push({
                    x: Math.random() < 0.5 ? -25 : width + 25,
                    y: Math.random() * (height * 0.75),
                    vx: (Math.random() * 2 + 2) * (Math.random() < 0.5 ? 1 : -1), 
                    radius: 4.5
                });
            }

            ctx.fillStyle = '#000';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, 0.5);
                if (player.vy > 0 && player.x > p.x - 20 && player.x < p.x + p.w + 20 && player.y > p.y - 5 && player.y < p.y + 10) {
                    player.vy = jumpStrength;
                }
            });

            enemies.forEach(e => {
                e.x += e.vx;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.fill();
                let dx = player.x - e.x; let dy = player.y - e.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < 15) {
                    if (player.vy > 0 && player.y < e.y) player.vy = jumpStrength; 
                    else resetToUnderConstruction();
                }
            });

            platforms = platforms.filter(p => p.y < height);
            enemies = enemies.filter(e => e.x > -60 && e.x < width + 60 && e.y < height);

            drawCoords(player.x, player.y, totalHeight, true);

            if (player.y > height + 100) resetToUnderConstruction();
            else requestAnimationFrame(animate);
        }

        function resetToUnderConstruction() {
            isPlaying = false;
            startBtn.style.display = 'block';
            init();
        }

        window.addEventListener('touchstart', (e) => {
            if(!isPlaying || !isMobile) return;
            const y = e.touches[0].clientY;
            if (!platforms.some(p => Math.abs(p.y - y) < 35)) {
                platforms.push({ x: e.touches[0].clientX - 25, y: y, w: 50, h: 0.5 });
            }
        });

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
