<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Gschwendtner</title>
    <style>
        body { 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0;
            background-color: #fff;
            color: #000;
            -webkit-font-smoothing: antialiased;
            /* Sorgt für eine extrem lange Scrollbar */
            min-height: 15000px; 
        }

        /* Name oben links fixiert */
        header {
            position: fixed;
            top: 0;
            left: 0;
            padding: 30px 40px;
            z-index: 100;
            pointer-events: none; /* Man kann durch den Header klicken */
        }

        h1 { 
            font-weight: 800; 
            font-size: 3.5rem; 
            margin: 0;
            text-transform: uppercase; 
            letter-spacing: -0.04em;
            line-height: 0.9;
            pointer-events: auto;
        }

        /* Mail unten rechts fixiert */
        .mail-link {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 1rem;
            text-decoration: none;
            color: #000;
            font-weight: 500;
            z-index: 100;
        }

        .mail-link:hover {
            opacity: 0.5;
        }

        /* Der Scroll-Content */
        .content {
            padding-top: 400px;
        }

        .dot-row {
            /* Vertikaler Abstand: 120% der Bildschirmhöhe pro Punkt */
            height: 120vh; 
            display: flex;
            position: relative;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #000;
            border-radius: 50%;
        }

        /* Viele verschiedene Random-Positionen */
        .p1 { margin-left: 15%; }
        .p2 { margin-left: 85%; }
        .p3 { margin-left: 45%; }
        .p4 { margin-left: 70%; }
        .p5 { margin-left: 5%; }
        .p6 { margin-left: 30%; }
        .p7 { margin-left: 90%; }
        .p8 { margin-left: 60%; }
        .p9 { margin-left: 20%; }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            header { padding: 20px; }
            .mail-link { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MAX GSCHWENDTNER</h1>
    </header>

    <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail@maxgschwendtner.com</a>

    <div class="content">
        <div class="dot-row p1"><div class="dot"></div></div>
        <div class="dot-row p4"><div class="dot"></div></div>
        <div class="dot-row p9"><div class="dot"></div></div>
        <div class="dot-row p2"><div class="dot"></div></div>
        <div class="dot-row p5"><div class="dot"></div></div>
        <div class="dot-row p8"><div class="dot"></div></div>
        <div class="dot-row p3"><div class="dot"></div></div>
        <div class="dot-row p7"><div class="dot"></div></div>
        <div class="dot-row p6"><div class="dot"></div></div>
        <div class="dot-row p2"><div class="dot"></div></div>
        <div class="dot-row p5"><div class="dot"></div></div>
        <div class="dot-row p1"><div class="dot"></div></div>
        <div class="dot-row p9"><div class="dot"></div></div>
        <div class="dot-row p4"><div class="dot"></div></div>
        <div class="dot-row p7"><div class="dot"></div></div>
        <div class="dot-row p3"><div class="dot"></div></div>
        <div class="dot-row p8"><div class="dot"></div></div>
        <div class="dot-row p6"><div class="dot"></div></div>
        <div class="dot-row p1"><div class="dot"></div></div>
        <div class="dot-row p4"><div class="dot"></div></div>
        <div class="dot-row p2"><div class="dot"></div></div>
        <div class="dot-row p9"><div class="dot"></div></div>
        </div>

</body>
</html>
