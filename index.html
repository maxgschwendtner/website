<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        :root {
            /* Hellmodus - Standard */
            --bg-color: #ffffff;
            --text-primary: #000000;
            --accent-blue: #0066cc;
            --info-color: rgba(0,0,0,0.4);
            --neon-yellow: #EAFF00; /* Apple-typisches Neongelb */
        }

        [data-theme='dark'] {
            /* Nachtmodus - Nur Hintergrund & Text-Inversion */
            --bg-color: #000000;
            --text-primary: #ffffff;
            --accent-blue: #2997ff;
            --info-color: rgba(255,255,255,0.4);
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--bg-color); 
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        /* Dein Name oben links */
        #logo {
            position: fixed; top: 35px; left: 35px; z-index: 100;
            display: flex; flex-direction: column; 
            font-size: 32px; font-weight: 800; line-height: 0.85; 
            letter-spacing: -0.05em; color: var(--text-primary); 
            text-transform: uppercase; pointer-events: auto;
            transition: color 0.4s ease;
        }
        @media (min-width: 769px) { #logo { flex-direction: row; gap: 10px; } }

        /* Der dünne Ring oben rechts */
        #theme-toggle {
            position: fixed; top: 40px; right: 35px; z-index: 100;
            width: 12px; height: 12px; 
            border: 1px solid var(--text-primary); /* Dünne Kontur wechselt Farbe */
            background: transparent;
            border-radius: 50%; cursor: pointer; pointer-events: auto; 
            transition: border-color 0.4s ease, transform 0.2s ease;
        }
        #theme-toggle:hover { transform: scale(1.2); }

        #footer {
            position: fixed; bottom: 35px; right: 35px; z-index: 100;
            font-size: 14px; font-weight: 500;
        }
        #footer a { 
            color: var(--accent-blue); text-decoration: none; 
            transition: color 0.4s ease; 
        }

        /* Under Construction Button - Bleibt Neongelb */
        #start-btn {
            position: absolute; z-index: 50;
            background: none; border: none; 
            color: var(--neon-yellow); 
            cursor: pointer; font-size: 13px; font-weight: 800; 
            letter-spacing: 2px; text-transform: uppercase;
            padding: 25px 35px; white-space: nowrap; 
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background-color: var(--neon-yellow); 
            z-index: -1; border-radius: 1px; display: none;
        }

        #start-btn:hover { color: #000000 !important; }
        #start-btn:hover::before { display: block; }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body data-theme="light">

    <div id="logo">
        <span>MAX</span><span>GSCHWENDTNER</span>
    </div>

    <div id="theme-toggle"></div>

    <div id="footer">
        <a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a>
    </div>
    
    <button id="start-btn"><span>UNDER CONSTRUCTION</span></button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const logoEl = document.getElementById('logo');

        let width, height, dpr;
        const baseSpeed = 1.05; 
        let bounceX, bounceY, speedX, speedY; 
        let mouseX = -1000, mouseY = -1000;
        let isHovering = false, pushLock = false;

        // Logik für den Klick auf den Ring
        themeToggle.addEventListener('click', () => {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', target);
        });

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.scale(dpr, dpr);
            
            const lRect = logoEl.getBoundingClientRect();
            // Startet irgendwo im unteren Bereich
            bounceX = Math.random() * (width - 250) + 125;
            bounceY = Math.random() * (height - lRect.bottom - 200) + lRect.bottom + 100;

            const angle = Math.random() * Math.PI * 2;
            const speed = Math.sqrt(baseSpeed**2 * 2);
            speedX = Math.cos(angle) * speed;
            speedY = Math.sin(angle) * speed;
        }

        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        startBtn.addEventListener('mousedown', () => {
            const r = Math.random();
            if (r < 0.33) { speedX *= -1.5; speedY *= -1.5; } 
            else if (r < 0.66) { let t = speedX; speedX = -speedY * 1.5; speedY = t * 1.5; } 
            else { let t = speedX; speedX = speedY * 1.5; speedY = -t * 1.5; }
            pushLock = true;
            setTimeout(() => pushLock = false, 750);
        });

        startBtn.addEventListener('mouseenter', () => isHovering = true);
        startBtn.addEventListener('mouseleave', () => isHovering = false);

        function update() {
            let dx = bounceX - mouseX, dy = bounceY - mouseY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (!isHovering && !pushLock && dist < 130) {
                speedX += dx * 0.003; speedY += dy * 0.003;
            }

            const targetMag = Math.sqrt(baseSpeed**2 * 2);
            const currentMag = Math.sqrt(speedX**2 + speedY**2) || 1;
            speedX += ((speedX / currentMag * targetMag) - speedX) * 0.04;
            speedY += ((speedY / currentMag * targetMag) - speedY) * 0.04;

            bounceX += speedX; bounceY += speedY;

            const btnRect = startBtn.getBoundingClientRect();
            const lRect = logoEl.getBoundingClientRect();

            // Grenzen für den Abprall (Wände und Logo)
            if (bounceX < btnRect.width/2 + 20 || bounceX > width - btnRect.width/2 - 20) speedX *= -1;
            if (bounceY < lRect.bottom + btnRect.height/2 + 20 || bounceY > height - btnRect.height/2 - 20) speedY *= -1;

            startBtn.style.left = (bounceX - btnRect.width/2) + 'px';
            startBtn.style.top = (bounceY - btnRect.height/2) + 'px';
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            ctx.font = "500 9px ui-monospace, SFMono-Regular, monospace";
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--info-color');
            ctx.fillText(`X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`, mouseX + 15, mouseY + 25);
            update();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', init);
        window.onload = () => { init(); loop(); };
    </script>
</body>
</html>
