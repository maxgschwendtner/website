<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Gschwendtner</title>
    <style>
        /* Grund-Einstellungen */
        body { 
            /* Nutzt die modernsten Grotesk-Schriften (ähnlich Neue Haas Grotesk) */
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 30px 40px; /* Abstand zum Rand */
            color: #000;
            background-color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout-Container */
        header {
            display: flex;
            justify-content: space-between; 
            align-items: baseline; /* Richtet Text an der unteren Linie aus */
        }

        /* Name links oben - Große, fette Grotesk */
        h1 { 
            font-weight: 800; /* Bold / Extra Bold */
            font-size: 3.5rem; /* Schön groß wie im Screenshot */
            margin: 0;
            text-transform: uppercase; 
            letter-spacing: -0.04em; /* Engeres Spacing für den Grotesk-Look */
            line-height: 0.9;
        }

        /* Komplette Mailadresse rechts */
        .mail-link {
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            color: #000;
            letter-spacing: -0.01em;
        }

        .mail-link:hover {
            text-decoration: underline;
        }

        /* Mobil-Optimierung: Untereinander auf dem Handy */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 20px;
            }
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>MAX GSCHWENDTNER</h1>
        <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail@maxgschwendtner.com</a>
    </header>

</body>
</html>
