<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner - GR Shift</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; cursor: none; } /* Cursor versteckt, wir zeichnen ihn selbst */
        
        #ui { position: absolute; width: 100%; top: 0; left: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; padding: 30px; box-sizing: border-box; z-index: 10; }
        .header { display: flex; flex-direction: column; text-align: left; font-size: 32px; font-weight: 900; line-height: 0.9; letter-spacing: -1.5px; color: #000; text-transform: uppercase; pointer-events: auto; }
        @media (min-width: 769px) { .header { flex-direction: row; gap: 12px; } }
        .footer { text-align: right; font-size: 15px; pointer-events: auto; }
        .footer a { color: #0000FF; text-decoration: none; font-weight: 100; letter-spacing: 0.5px; }

        #start-btn {
            position: absolute; top: 0; left: 0;
            background: none; border: none; color: #FFF000; cursor: none; pointer-events: auto;
            font-size: 14px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            padding: 25px 35px; z-index: 11; white-space: nowrap; display: inline-block;
            transition: color 0.05s ease;
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background: #EAFF00; z-index: -1; border-radius: 2px; display: none;
        }

        #start-btn:hover { color: #000; }
        #start-btn:hover::before { 
            display: block; 
            animation: apple-blink 4.5s infinite;
            animation-delay: 3s;
        }

        @keyframes apple-blink {
            0%, 10%, 20%, 30% { opacity: 1; text-decoration: underline; text-underline-offset: 3px; }
            5%, 15%, 25% { opacity: 0; text-decoration: none; }
            33.1%, 100% { opacity: 1; text-decoration: underline; text-underline-offset: 3px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="header" id="main-header"><span>MAX</span><span>GSCHWENDTNER</span></div>
        <div class="footer"><a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a></div>
    </div>
    <button id="start-btn">UNDER CONSTRUCTION</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const headerEl = document.getElementById('main-header');

        let width, height, dpr;
        let bounceX, bounceY, speedX = 1.2, speedY = 1.2; // Gemütliche DVD-Geschwindigkeit
        let mouseX = -100, mouseY = -100, curX = -100, curY = -100;
        let isHovering = false, hoverStartTime = 0;
        let compassAngle = 0;

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            bounceX = width / 2; bounceY = height / 2;
        }

        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        startBtn.addEventListener('mouseenter', () => { isHovering = true; hoverStartTime = Date.now(); });
        startBtn.addEventListener('mouseleave', () => { isHovering = false; });
        
        startBtn.addEventListener('mousedown', () => {
            // Richtungswechsel-Logik (90/180 Grad)
            const r = Math.random();
            if (r < 0.33) speedX *= -1;
            else if (r < 0.66) speedY *= -1;
            else { speedX *= -1; speedY *= -1; }
        });

        function drawGrid() {
            const timeElapsed = isHovering ? (Date.now() - hoverStartTime) / 1000 : 0;
            const useGR = timeElapsed > 3;
            ctx.fillStyle = "rgba(0,0,0,0.18)"; // Sichtbare Rasterpunkte
            const spacing = 40;
            for (let x = 0; x <= width; x += spacing) {
                for (let y = 0; y <= height; y += spacing) {
                    let dx = x, dy = y;
                    if (useGR) {
                        dx += Math.sin(x * 1.618) * 4;
                        dy += Math.cos(y * 1.618) * 4;
                    }
                    ctx.beginPath(); ctx.arc(dx, dy, 0.7, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

        function drawCursorUI() {
            // Smoothes Folgen des Cursors
            curX += (mouseX - curX) * 0.2;
            curY += (mouseY - curY) * 0.2;

            const targetAngle = Math.atan2(speedY, speedX);
            let angleDiff = targetAngle - compassAngle;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            compassAngle += angleDiff * 0.1;

            ctx.save();
            ctx.translate(curX, curY);
            
            // Fadenkreuz/Punkt für Cursor
            ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, Math.PI * 2); ctx.fillStyle = "#000"; ctx.fill();

            // Koordinaten
            ctx.font = "400 10px monospace";
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.textAlign = "center";
            ctx.fillText(`X:${Math.round(curX)} Y:${Math.round(curY)}`, 0, 25);
            
            // Kompass-Vektor (Dezenter Strich mit kleiner Spitze)
            ctx.translate(0, 35);
            ctx.rotate(compassAngle);
            ctx.strokeStyle = "rgba(0,0,0,0.4)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-5, 0); ctx.lineTo(5, 0); // Strich
            ctx.moveTo(2, -2); ctx.lineTo(5, 0); ctx.lineTo(2, 2); // Kleine Spitze
            ctx.stroke();
            
            ctx.restore();
        }

        function update() {
            // Fleeing-Effekt: Wenn Cursor nah, Button wegstoßen
            let dx = bounceX - mouseX;
            let dy = bounceY - mouseY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                speedX += dx * 0.002;
                speedY += dy * 0.002;
            }

            const rect = startBtn.getBoundingClientRect();
            const headerRect = headerEl.getBoundingClientRect();
            
            bounceX += speedX;
            bounceY += speedY;

            // Wand-Kollision (Klassisch DVD)
            if (bounceX <= rect.width/2 + 20 || bounceX >= width - rect.width/2 - 20) speedX *= -1;
            if (bounceY <= headerRect.bottom + rect.height/2 || bounceY >= height - rect.height/2 - 20) speedY *= -1;

            startBtn.style.left = (bounceX - rect.width/2) + 'px';
            startBtn.style.top = (bounceY - rect.height/2) + 'px';
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            update();
            drawCursorUI();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', init);
        init(); loop();
    </script>
</body>
</html>
