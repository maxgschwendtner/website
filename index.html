<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden;
            font-family: "Inter", sans-serif;
            background-color: #fff;
            -webkit-tap-highlight-color: transparent;
        }

        /* UI Elemente */
        header {
            position: fixed; top: 0; left: 0; padding: 30px 40px;
            z-index: 100; pointer-events: none;
        }
        h1 { 
            font-weight: 800; font-size: 3.5rem; margin: 0;
            text-transform: uppercase; letter-spacing: -0.04em; line-height: 0.9;
        }
        .mail-link {
            position: fixed; bottom: 30px; right: 40px;
            font-size: 1rem; text-decoration: none; color: #000;
            font-weight: 500; z-index: 100;
        }

        /* Das Spielfeld */
        #game-container {
            position: relative;
            width: 100%;
            min-height: 15000px; /* Deine unendliche Länge */
            background: white;
        }

        .dot {
            position: absolute;
            width: 12px; height: 12px;
            background-color: #000;
            border-radius: 50%;
        }

        /* Der Spieler (Gelber Punkt) */
        #player {
            position: fixed; /* Bleibt im Sichtfeld */
            width: 16px; height: 16px;
            background-color: #FFD700; /* Gold/Gelb */
            border-radius: 50%;
            z-index: 50;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail@maxgschwendtner.com</a>

        <div id="player"></div>

    <script>
        const player = document.getElementById('player');
        const container = document.getElementById('game-container');
        
        let pX = window.innerWidth / 2;
        let pY = 150; // Position im Viewport
        let vX = 0;
        let vY = 0;
        let scrollY = 0;
        const gravity = 0.25;

        // Plattformen generieren
        const platforms = [];
        for (let i = 0; i < 150; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            const x = Math.random() * (window.innerWidth - 40) + 20;
            const y = i * 150 + 200; 
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
            container.appendChild(dot);
            platforms.push({ x, y, el: dot });
        }

        // Steuerung
        let moveLeft = false;
        let moveRight = false;

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') moveLeft = true;
            if (e.key === 'ArrowRight') moveRight = true;
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft') moveLeft = false;
            if (e.key === 'ArrowRight') moveRight = false;
        });

        // Mobile Steuerung
        window.addEventListener('touchstart', e => {
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) moveLeft = true;
            else moveRight = true;
        });
        window.addEventListener('touchend', () => {
            moveLeft = false;
            moveRight = false;
        });

            // Physik
            if (moveLeft) vX -= 0.8;
            if (moveRight) vX += 0.8;
            vX *= 0.9; // Reibung
            pX += vX;
