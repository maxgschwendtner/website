<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #000000;
            --accent-blue: #0000FF;
            --info-color: rgba(0,0,0,0.45);
            --btn-yellow: #FFF000;
        }

        [data-theme='dark'] {
            --bg-color: #0a0a0a;
            --text-primary: #ffffff;
            --accent-blue: #5555FF;
            --info-color: rgba(255,255,255,0.45);
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            transition: background 0.8s ease; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        canvas { 
            display: block; position: absolute; top: 0; left: 0; 
            z-index: 1; pointer-events: none; 
        }
        
        #ui { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            pointer-events: none; z-index: 100; 
            display: flex; flex-direction: column; justify-content: space-between; 
            padding: 30px 35px; box-sizing: border-box;
        }
        
        .nav-top { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            width: 100%; pointer-events: none;
        }

        .header { 
            display: flex; flex-direction: column; 
            font-size: 34px; font-weight: 800; line-height: 0.82; 
            letter-spacing: -2.1px; color: var(--text-primary); 
            text-transform: uppercase; pointer-events: auto;
        }
        @media (min-width: 769px) { .header { flex-direction: row; gap: 10px; } }

        #theme-toggle {
            width: 12px; height: 12px; border: 1.2px solid var(--text-primary);
            border-radius: 50%; cursor: pointer; pointer-events: auto; 
            margin-top: 6px; transition: transform 0.2s ease;
        }
        
        .footer { text-align: right; font-size: 14px; pointer-events: auto; }
        .footer a { color: var(--accent-blue); text-decoration: none; font-weight: 600; }

        #start-btn {
            position: absolute; z-index: 50;
            background: none; border: none; color: var(--btn-yellow);
            cursor: pointer; font-size: 13px; font-weight: 800; 
            letter-spacing: 2.5px; text-transform: uppercase;
            padding: 25px 35px; white-space: nowrap; 
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background: #EAFF00; z-index: -1; border-radius: 1px; display: none;
        }

        #start-btn:hover { color: #000000 !important; }
        #start-btn:hover::before { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="nav-top">
            <div class="header" id="main-header">
                <span>MAX</span><span>GSCHWENDTNER</span>
            </div>
            <div id="theme-toggle"></div>
        </div>
        <div class="footer">
            <a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a>
        </div>
    </div>
    
    <button id="start-btn"><span>UNDER CONSTRUCTION</span></button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const headerEl = document.getElementById('main-header');
        const themeToggle = document.getElementById('theme-toggle');

        let width, height, dpr;
        const baseSpeed = 1.05; 
        let bounceX, bounceY, speedX, speedY; 
        let mouseX = -1000, mouseY = -1000;
        let isHovering = false, pushLock = false;

        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        });

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            
            // Reset und Skalierung für High-Res Displays
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.scale(dpr, dpr);
            
            const hRect = headerEl.getBoundingClientRect();
            const btnRect = startBtn.getBoundingClientRect();

            bounceX = Math.random() * (width - 200) + 100;
            bounceY = Math.random() * (height - hRect.bottom - 100) + hRect.bottom + 50;

            const angle = Math.random() * Math.PI * 2;
            const speed = Math.sqrt(baseSpeed**2 * 2);
            speedX = Math.cos(angle) * speed;
            speedY = Math.sin(angle) * speed;
        }

        window.addEventListener('mousemove', (e) => { 
            mouseX = e.clientX; 
            mouseY = e.clientY; 
        });

        startBtn.addEventListener('mousedown', () => {
            const r = Math.random();
            if (r < 0.33) { speedX *= -1.5; speedY *= -1.5; } 
            else if (r < 0.66) { let t = speedX; speedX = -speedY * 1.5; speedY = t * 1.5; } 
            else { let t = speedX; speedX = speedY * 1.5; speedY = -t * 1.5; }
            pushLock = true;
            setTimeout(() => pushLock = false, 750);
        });

        startBtn.addEventListener('mouseenter', () => isHovering = true);
        startBtn.addEventListener('mouseleave', () => isHovering = false);

        function update() {
            let dx = bounceX - mouseX, dy = bounceY - mouseY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (!isHovering && !pushLock && dist < 130) {
                speedX += dx * 0.003; speedY += dy * 0.003;
            }

            const targetMag = Math.sqrt(baseSpeed**2 * 2);
            const currentMag = Math.sqrt(speedX**2 + speedY**2) || 1;
            speedX += ((speedX / currentMag * targetMag) - speedX) * 0.04;
            speedY += ((speedY / currentMag * targetMag) - speedY) * 0.04;

            bounceX += speedX; bounceY += speedY;

            const btnRect = startBtn.getBoundingClientRect();
            const hRect = headerEl.getBoundingClientRect();

            if (bounceX < btnRect.width/2 + 20 || bounceX > width - btnRect.width/2 - 20) speedX *= -1;
            if (bounceY < hRect.bottom + btnRect.height/2 + 20 || bounceY > height - btnRect.height/2 - 20) speedY *= -1;

            startBtn.style.left = (bounceX - btnRect.width/2) + 'px';
            startBtn.style.top = (bounceY - btnRect.height/2) + 'px';
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            
            // Koordinaten Zeichnen: Fixiert auf Mausposition
            ctx.font = "400 9px 'SF Mono', 'Roboto Mono', monospace";
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--info-color');
            // Text wird leicht versetzt zur Maus gezeichnet (15px rechts, 25px runter)
            ctx.fillText(`X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`, mouseX + 15, mouseY + 25);
            
            update();
            requestAnimationFrame(loop);
        }

        const hour = new Date().getHours();
        document.body.setAttribute('data-theme', (hour >= 18 || hour < 6) ? 'dark' : 'light');

        window.addEventListener('resize', init);
        window.onload = () => { init(); loop(); };
    </script>
</body>
</html>
