<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner</title>
    <style>
        :root {
            /* Apple Ästhetik - Light Mode */
            --bg-color: #ffffff;
            --text-color: #1d1d1f; /* Weiches Apple-Schwarz */
            --accent-blue: #0066cc; /* Apple Link-Blau */
            --info-color: #86868b; /* Sanftes Grau für Koordinaten */
            --btn-yellow: #FFCC00; 
        }

        [data-theme='dark'] {
            /* Apple Ästhetik - Dark Mode */
            --bg-color: #000000; /* Tiefes OLED-Schwarz */
            --text-color: #f5f5f7; /* Klares Apple-Weiß */
            --accent-blue: #2997ff; /* Helleres Blau für Dark Mode */
            --info-color: #6e6e73;
            --btn-yellow: #FFD60A;
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            /* Native Apple System-Fonts */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Feste, absolute Positionierungen (Bulletproof gegen Browser-Bugs) */
        #logo {
            position: fixed;
            top: 35px;
            left: 35px;
            z-index: 100;
            display: flex; 
            flex-direction: column; 
            font-size: 32px; 
            font-weight: 800; 
            line-height: 0.85; 
            letter-spacing: -0.05em; 
            color: var(--text-color); 
            text-transform: uppercase; 
            pointer-events: auto;
            transition: color 0.8s ease;
        }
        @media (min-width: 769px) { #logo { flex-direction: row; gap: 10px; } }

        #theme-toggle {
            position: fixed;
            top: 40px;
            right: 35px;
            z-index: 100;
            width: 13px; 
            height: 13px; 
            border: 1.5px solid var(--text-color);
            border-radius: 50%; 
            cursor: pointer; 
            pointer-events: auto; 
            transition: transform 0.2s ease, border-color 0.8s ease;
        }
        #theme-toggle:hover { transform: scale(1.2); }

        #footer {
            position: fixed;
            bottom: 35px;
            right: 35px;
            z-index: 100;
            font-size: 14px; 
            font-weight: 500;
            letter-spacing: -0.01em;
            pointer-events: auto;
        }
        #footer a { 
            color: var(--accent-blue); 
            text-decoration: none; 
            transition: color 0.8s ease; 
        }

        /* Der flüchtende Button */
        #start-btn {
            position: absolute; 
            z-index: 50;
            background: none; 
            border: none; 
            color: var(--btn-yellow);
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 800; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            padding: 25px 35px; 
            white-space: nowrap; 
            pointer-events: auto;
        }

        #start-btn::before {
            content: ""; position: absolute; top: 22px; left: 30px; right: 30px; bottom: 22px;
            background: var(--btn-yellow); z-index: -1; border-radius: 2px; display: none;
        }

        /* Hover-Effekt: Apple-Schwarz auf Gelb */
        #start-btn:hover { color: #000000 !important; }
        #start-btn:hover::before { display: block; }

        canvas { 
            display: block; position: absolute; top: 0; left: 0; 
            z-index: 1; pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="logo">
        <span>MAX</span><span>GSCHWENDTNER</span>
    </div>
    <div id="theme-toggle"></div>
    <div id="footer">
        <a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a>
    </div>
    
    <button id="start-btn"><span>UNDER CONSTRUCTION</span></button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const logoEl = document.getElementById('logo');
        const themeToggle = document.getElementById('theme-toggle');

        let width, height, dpr;
        const baseSpeed = 1.05; 
        let bounceX, bounceY, speedX, speedY; 
        let mouseX = -1000, mouseY = -1000;
        let isHovering = false, pushLock = false;

        // Theme Switch Logic
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        });

        function init() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.scale(dpr, dpr);
            
            const logoRect = logoEl.getBoundingClientRect();
            const btnRect = startBtn.getBoundingClientRect();

            // Zufälliger Startpunkt, aber sicher außerhalb des Logos
            bounceX = Math.random() * (width - 200) + 100;
            bounceY = Math.random() * (height - logoRect.bottom - 150) + logoRect.bottom + 50;

            const angle = Math.random() * Math.PI * 2;
            const speed = Math.sqrt(baseSpeed**2 * 2);
            speedX = Math.cos(angle) * speed;
            speedY = Math.sin(angle) * speed;
        }

        window.addEventListener('mousemove', (e) => { 
            mouseX = e.clientX; 
            mouseY = e.clientY; 
        });

        startBtn.addEventListener('mousedown', () => {
            const r = Math.random();
            if (r < 0.33) { speedX *= -1.5; speedY *= -1.5; } 
            else if (r < 0.66) { let t = speedX; speedX = -speedY * 1.5; speedY = t * 1.5; } 
            else { let t = speedX; speedX = speedY * 1.5; speedY = -t * 1.5; }
            pushLock = true;
            setTimeout(() => pushLock = false, 750);
        });

        startBtn.addEventListener('mouseenter', () => isHovering = true);
        startBtn.addEventListener('mouseleave', () => isHovering = false);

        function update() {
            let dx = bounceX - mouseX, dy = bounceY - mouseY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (!isHovering && !pushLock && dist < 130) {
                speedX += dx * 0.003; speedY += dy * 0.003;
            }

            const targetMag = Math.sqrt(baseSpeed**2 * 2);
            const currentMag = Math.sqrt(speedX**2 + speedY**2) || 1;
            speedX += ((speedX / currentMag * targetMag) - speedX) * 0.04;
            speedY += ((speedY / currentMag * targetMag) - speedY) * 0.04;

            bounceX += speedX; bounceY += speedY;

            const btnRect = startBtn.getBoundingClientRect();
            const logoRect = logoEl.getBoundingClientRect();

            // Kollision an den Rändern und unterhalb des Logos
            if (bounceX < btnRect.width/2 + 20 || bounceX > width - btnRect.width/2 - 20) speedX *= -1;
            if (bounceY < logoRect.bottom + btnRect.height/2 + 20 || bounceY > height - btnRect.height/2 - 20) speedY *= -1;

            startBtn.style.left = (bounceX - btnRect.width/2) + 'px';
            startBtn.style.top = (bounceY - btnRect.height/2) + 'px';
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            
            // Winziges Koordinatensystem, das perfekt an der Maus klebt (Apple SF Mono)
            ctx.font = "500 9px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--info-color');
            ctx.fillText(`X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`, mouseX + 15, mouseY + 25);
            
            update();
            requestAnimationFrame(loop);
        }

        // Setzt das initial Theme (Nacht oder Tag)
        const hour = new Date().getHours();
        document.body.setAttribute('data-theme', (hour >= 18 || hour < 6) ? 'dark' : 'light');

        window.addEventListener('resize', init);
        window.onload = () => { init(); loop(); };
    </script>
</body>
</html>
