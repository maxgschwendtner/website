<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Gschwendtner - Jump</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: Helvetica, Arial, sans-serif; }
        canvas { display: block; }

        /* UI-Layout */
        #ui {
            position: absolute; width: 100%; top: 0; left: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; height: 100vh;
            padding: 30px; box-sizing: border-box;
        }

        /* Name oben links: BOLD wie im Screenshot */
        .header { 
            text-align: left; 
            font-size: 32px; 
            font-weight: 900; /* Extra Fett */
            line-height: 0.9; 
            letter-spacing: -1px; 
            color: #000; 
            text-transform: uppercase;
        }

        /* Kleiner schwarzer Punkt unter dem Namen */
        .dot {
            width: 6px;
            height: 6px;
            background-color: #000;
            border-radius: 50%;
            margin-top: 15px;
        }

        /* Mail unten rechts */
        .footer { text-align: right; font-size: 12px; font-weight: 400; color: #000; pointer-events: auto; }
        .footer a { color: #000; text-decoration: none; }

        /* Start-Button: Nur Outline */
        #start-btn {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            padding: 10px 20px; background: transparent; color: #000;
            border: 1px solid #000; cursor: pointer; pointer-events: auto;
            font-size: 14px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="header">
            MAX<br>GSCHWENDTNER
            <div class="dot"></div> </div>
        <div class="footer">
            <a href="mailto:mail@maxgschwendtner.com">mail@maxgschwendtner.com</a>
        </div>
    </div>

    <button id="start-btn">START GAME</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        let width, height, player, platforms = [], gravity = 0.35, jumpStrength = -9, maxPlatforms = 7;
        let tilt = 0, isPlaying = false;

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            player = { x: width / 2, y: height / 2, radius: 8, vx: 0, vy: 0 };
            
            platforms = [];
            // Erste Plattform direkt unter dem Spieler
            platforms.push({ x: width / 2 - 30, y: height / 2 + 50, w: 60, h: 1 }); 
            
            for(let i = 1; i < maxPlatforms; i++){
                generatePlatform(i);
            }
        }

        function generatePlatform(index) {
            let y = platforms.length > 0 ? platforms[platforms.length-1].y - (height / 6) : height * 0.8;
            platforms.push({
                x: Math.random() * (width - 70),
                y: y,
                w: 70,
                h: 1 // Hauchdünne Linie (1px)
            });
        }

        function handleOrientation(event) { tilt = event.gamma; }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
            startBtn.style.display = 'none';
            isPlaying = true;
            update();
        });

        function update() {
            if(!isPlaying) return;
            ctx.clearRect(0, 0, width, height);

            player.vx = tilt * 0.6;
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = width;
            if (player.x > width) player.x = 0;

            if (player.y < height / 2) {
                let diff = height / 2 - player.y;
                player.y = height / 2;
                platforms.forEach(p => p.y += diff);
            }

            // Zeichne Podeste (1px dünn)
            ctx.fillStyle = '#000';
            platforms.forEach((p) => {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                if (player.vy > 0 && player.x > p.x && player.x < p.x + p.w && player.y + player.radius > p.y && player.y + player.radius < p.y + 10) {
                    player.vy = jumpStrength;
                }
            });

            platforms = platforms.filter(p => p.y < height);
            while(platforms.length < maxPlatforms) generatePlatform();

            // Gelber Punkt (Spieler)
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            if (player.y > height) init();
            requestAnimationFrame(update);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
