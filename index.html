<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Gschwendtner</title>
    <style>
        /* Grund-Einstellungen */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 20px 40px; /* Abstand zum Rand */
            color: #000;
            background-color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        /* Der Header, der alles nach außen drückt */
        header {
            display: flex;
            justify-content: space-between; /* Links und rechts trennen */
            align-items: flex-start;
        }

        /* Name links oben */
        h1 { 
            font-weight: 700; 
            font-size: 1.5rem; 
            margin: 0;
            text-transform: uppercase; /* Alles Großbuchstaben wie im Screenshot */
            letter-spacing: -0.02em;
        }

        /* Mail rechts oben */
        .mail-link {
            font-size: 0.9rem;
            text-decoration: none;
            color: #000;
            margin-top: 5px; /* Kleiner Ausgleich nach unten */
        }

        .mail-link:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>Max Gschwendtner</h1>
        <a href="mailto:mail@maxgschwendtner.com" class="mail-link">mail</a>
    </header>

</body>
</html>
